<svg viewBox="0 0 220 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Illustration of a sparkling glass of prosecco">
  <defs>
    <linearGradient id="glassWall" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.05"/>
      <stop offset="12%" stop-color="#FFFFFF" stop-opacity="0.55"/>
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0.15"/>
      <stop offset="88%" stop-color="#FFFFFF" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="prosecco" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F3DFA6"/>
      <stop offset="100%" stop-color="#E8C36C"/>
    </linearGradient>
    <radialGradient id="foam" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- gold flecks scattered around the glass -->
  <g fill="#C9A24A" opacity="0.55">
    <circle cx="18" cy="40" r="2.5"/>
    <circle cx="34" cy="18" r="1.6"/>
    <circle cx="8" cy="80" r="1.8"/>
    <circle cx="196" cy="36" r="2.2"/>
    <circle cx="206" cy="70" r="1.5"/>
    <circle cx="178" cy="14" r="1.4"/>
    <circle cx="30" cy="130" r="1.3"/>
    <circle cx="190" cy="120" r="1.6"/>
  </g>

  <!-- bowl of the glass (flute) -->
  <path d="M70 30
           C 70 90, 76 140, 92 188
           C 98 206, 110 214, 110 214
           C 110 214, 122 206, 128 188
           C 144 140, 150 90, 150 30
           Z"
        fill="none" stroke="#C7B07A" stroke-width="2.2" stroke-opacity="0.7"/>

  <!-- prosecco liquid -->
  <path d="M77 96
           C 79 130, 88 162, 99 192
           C 103 202, 110 208, 110 208
           C 110 208, 117 202, 121 192
           C 132 162, 141 130, 143 96
           Z"
        fill="url(#prosecco)" opacity="0.9"/>

  <!-- foam / bubbles at surface -->
  <ellipse cx="110" cy="97" rx="33" ry="6" fill="url(#foam)"/>
  <g fill="#FBF1D6">
    <circle cx="96" cy="120" r="2"/>
    <circle cx="122" cy="135" r="1.6"/>
    <circle cx="104" cy="155" r="1.8"/>
    <circle cx="116" cy="170" r="1.4"/>
    <circle cx="108" cy="185" r="1.6"/>
    <circle cx="100" cy="140" r="1.2"/>
    <circle cx="118" cy="105" r="1.3"/>
  </g>

  <!-- glass wall highlight -->
  <path d="M70 30 C 70 90, 76 140, 92 188 C 98 206, 110 214, 110 214"
        fill="none" stroke="url(#glassWall)" stroke-width="6" stroke-linecap="round"/>
  <path d="M150 30 C 150 90, 144 140, 128 188 C 122 206, 110 214, 110 214"
        fill="none" stroke="url(#glassWall)" stroke-width="6" stroke-linecap="round"/>

  <!-- rim -->
  <ellipse cx="110" cy="30" rx="40" ry="7" fill="none" stroke="#C7B07A" stroke-width="2.2" stroke-opacity="0.8"/>
  <ellipse cx="110" cy="29" rx="40" ry="6.4" fill="#FFFFFF" opacity="0.12"/>

  <!-- stem -->
  <path d="M110 214 L110 330" stroke="#C7B07A" stroke-width="2.2" stroke-opacity="0.7" fill="none"/>
  <path d="M110 214 L110 330" stroke="#FFFFFF" stroke-width="0.8" stroke-opacity="0.5" fill="none"/>

  <!-- base -->
  <path d="M70 344 C 70 332, 88 326, 110 326 C 132 326, 150 332, 150 344 C 150 352, 132 356, 110 356 C 88 356, 70 352, 70 344 Z"
        fill="none" stroke="#C7B07A" stroke-width="2.2" stroke-opacity="0.7"/>
  <ellipse cx="110" cy="344" rx="40" ry="9" fill="#FFFFFF" opacity="0.08"/>
</svg>
