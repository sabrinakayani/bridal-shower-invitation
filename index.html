<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Bridal Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
/* ===== BASE ===== */
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: radial-gradient(circle at top, #f6f1ec, #e6dbd2 70%, #ddd0c6);
  overflow:hidden;
  font-family: Inter, sans-serif;
}

/* soft vignette */
body::after{
  content:"";
  position:absolute;
  inset:0;
  background: radial-gradient(circle at center, transparent 40%, rgba(0,0,0,0.25));
  pointer-events:none;
}

/* ===== SCENE ===== */
.scene{
  perspective: 1600px;
}

/* ===== ENVELOPE ===== */
.envelope{
  width:420px;
  height:260px;
  position:relative;
  transform-style:preserve-3d;
  cursor:pointer;
}

/* base body */
.env-body{
  position:absolute;
  inset:0;
  background: linear-gradient(145deg, #fffaf5, #f0e6dd);
  border-radius:14px;
  box-shadow:
    0 40px 80px rgba(0,0,0,0.18),
    inset 0 1px 0 rgba(255,255,255,0.8);
  overflow:hidden;
}

/* inner shadow lip */
.env-body::before{
  content:"";
  position:absolute;
  inset:0;
  box-shadow: inset 0 -20px 40px rgba(0,0,0,0.08);
}

/* envelope front fold */
.env-front{
  position:absolute;
  inset:0;
  clip-path: polygon(0 100%, 50% 45%, 100% 100%, 100% 100%, 0 100%);
  background: linear-gradient(to bottom, #fffdf9, #efe2d7);
  z-index:4;
}

/* top flap */
.flap{
  position:absolute;
  width:100%;
  height:100%;
  background: linear-gradient(145deg, #ffffff, #eadfd6);
  clip-path: polygon(0 0, 50% 55%, 100% 0);
  transform-origin: top;
  transition: transform 1.4s cubic-bezier(.2,.8,.2,1);
  z-index:6;
  filter: drop-shadow(0 10px 10px rgba(0,0,0,0.2));
}

/* wax seal */
.seal{
  position:absolute;
  width:62px;
  height:62px;
  top:92px;
  left:50%;
  transform:translateX(-50%);
  border-radius:50%;
  background:
    radial-gradient(circle at 30% 30%, #d08a96, #7a2f3a 70%, #5a1f28);
  box-shadow:
    0 15px 25px rgba(0,0,0,0.25),
    inset 0 2px 3px rgba(255,255,255,0.4);
  z-index:7;
  transition: all 1.2s ease;
}

.seal::after{
  content:"✿";
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  color:rgba(255,255,255,0.85);
  font-size:18px;
}

/* ===== LETTER ===== */
.card{
  position:absolute;
  width:88%;
  height:88%;
  left:6%;
  top:95%;
  background:
    linear-gradient(#ffffff, #faf7f4);
  border-radius:12px;
  box-shadow:
    0 30px 60px rgba(0,0,0,0.18);
  padding:28px;
  box-sizing:border-box;
  text-align:center;
  transition: transform 1.6s cubic-bezier(.2,.9,.2,1), top 1.6s cubic-bezier(.2,.9,.2,1);
  z-index:3;
}

/* subtle paper grain */
.card::before{
  content:"";
  position:absolute;
  inset:0;
  background-image:url("https://grainy-gradients.vercel.app/noise.svg");
  opacity:0.05;
  mix-blend-mode:multiply;
  border-radius:12px;
}

/* typography */
.card h1{
  font-family:"Playfair Display", serif;
  font-size:26px;
  margin-bottom:10px;
  letter-spacing:0.5px;
}

.card p{
  font-size:14px;
  color:#444;
  line-height:1.6;
}

/* ===== OPEN STATE ===== */
.envelope.open .flap{
  transform: rotateX(180deg);
}

.envelope.open .seal{
  transform: translateX(-50%) scale(0.2);
  opacity:0;
  filter: blur(2px);
}

.envelope.open .card{
  top:12%;
  transform: translateY(-30px);
}

/* floating shadow shift */
.envelope::after{
  content:"";
  position:absolute;
  width:90%;
  height:30px;
  bottom:-40px;
  left:5%;
  background: rgba(0,0,0,0.25);
  filter: blur(20px);
  opacity:0.4;
  transition: all 1.2s ease;
}

.envelope.open::after{
  opacity:0.2;
  transform: scale(0.9);
}

/* hint */
.hint{
  position:absolute;
  width:100%;
  text-align:center;
  bottom:-60px;
  font-size:13px;
  color:#6b5e57;
  letter-spacing:0.5px;
}
</style>
</head>

<body>

<div class="scene">
  <div class="envelope" id="env">

    <div class="env-body"></div>
    <div class="env-front"></div>

    <div class="flap"></div>
    <div class="seal"></div>

    <div class="card">
      <h1>Bridal Shower</h1>
      <p><b>Alvina Kayani</b></p>
      <p>
        Aya Experience – Lebanese Cuisine<br/>
        16977 Autoroute Transcanadienne<br/>
        Kirkland, Quebec
      </p>
      <br/>
      <p>
        RSVP: Amber Kayani<br/>
        (514) 659-2923
      </p>
    </div>

  </div>

  <div class="hint">Click to open invitation</div>
</div>

<script>
document.getElementById("env").addEventListener("click", function(){
  this.classList.toggle("open");
});
</script>

</body>
</html>
