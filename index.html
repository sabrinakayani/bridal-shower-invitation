<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>You're Invited</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Great+Vibes&family=Inter:wght@300;400&display=swap" rel="stylesheet">
</head>

<body>

<div class="bg"></div>

<div class="container">

  <div class="title">You're Invited</div>
  <div class="subtitle">Tap the envelope to open</div>

  <!-- ENVELOPE -->
  <div class="envelope" id="envelope">
    <div class="flap"></div>
    <div class="body"></div>
    <div class="seal">AK</div>
  </div>

  <!-- INVITATION -->
  <div class="card hidden" id="card">

    <div class="name">Alvina Kayani</div>
    <div class="event">Bridal Shower</div>

    <div class="info">
      <p><strong>Venue</strong></p>
      <p>Aya Experience – Lebanese Cuisine</p>
      <p>16977 Autoroute Transcanadienne</p>
      <p>Kirkland, QC</p>

      <br>

      <p><strong>RSVP</strong></p>
      <p>Amber Kayani</p>
      <p>(514) 659-2923</p>
    </div>

    <div class="buttons">
      <button onclick="maps()">Directions</button>
      <button onclick="calendar()">Add to Calendar</button>
      <button onclick="rsvp()">RSVP</button>
    </div>

    <div class="footer">
      We can’t wait to celebrate with you 🤍
    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
