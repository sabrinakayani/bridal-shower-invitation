<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pearls &amp; Prosecco — A Bridal Shower Invitation</title>
<meta name="description" content="You're invited to celebrate the bride-to-be — Pearls & Prosecco bridal shower.">
<link rel="icon" href="assets/favicon.svg" type="image/svg+xml">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Mrs+Saint+Delafield&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="silk-corner silk-tl" aria-hidden="true"></div>
<div class="silk-corner silk-br" aria-hidden="true"></div>

<main class="scene">

  <header class="intro">
    <p class="eyebrow" data-reveal="1">You're Invited</p>
    <p class="eyebrow-sub" data-reveal="2">To a special celebration</p>
    <div class="divider" data-reveal="3">
      <span class="divider-line"></span>
      <span class="divider-pearl"></span>
      <span class="divider-line"></span>
    </div>
  </header>

  <section class="envelope-stage" aria-label="Wedding shower invitation">

    <div class="envelope" id="envelope">

      <div class="back-flap" aria-hidden="true"></div>

      <div class="pearl-strand pearl-strand--left" aria-hidden="true"></div>
      <div class="pearl-strand pearl-strand--right" aria-hidden="true"></div>

      <article class="card" id="card">
        <div class="gold-flecks" aria-hidden="true"></div>

        <img class="glass-illustration" src="assets/champagne.svg" alt="Illustration of a glass of prosecco" width="110" height="210">

        <div class="card-copy">
          <p class="script-title">Pearls <span class="heart-glyph">♡</span></p>
          <p class="caps-title">&amp; Prosecco</p>

          <p class="card-text">
            Please join us as we<br>
            celebrate the bride&#8209;to&#8209;be
          </p>

          <p class="bride-name" id="brideName">Olivia Jordan</p>

          <div class="divider divider--small">
            <span class="divider-line"></span>
            <span class="divider-pearl"></span>
            <span class="divider-line"></span>
          </div>

          <div class="event-details" id="eventDetails">
            <p id="eventDate">Saturday, August 15th · 2:00 PM</p>
            <p id="eventLocation">The Garden Pavilion · 12 Rosewood Lane</p>
          </div>
        </div>
      </article>

      <div class="front-flap" id="frontFlap" aria-hidden="true"></div>

      <button class="wax-seal" id="waxSeal" type="button" aria-label="Open the invitation to reveal the details">
        <img src="assets/wax-seal.svg" alt="" width="64" height="64">
      </button>

    </div>

    <button class="open-prompt" id="openPrompt" type="button">
      <span class="heart-glyph heart-small">♡</span>
      <span class="open-text" id="openText">open the envelope</span>
    </button>
    <span class="chevron" id="chevron" aria-hidden="true">⌄</span>

  </section>

  <section class="details-bar" id="detailsBar" aria-label="Event actions">
    <a class="detail-item" id="directionsLink" href="#" target="_blank" rel="noopener">
      <svg class="detail-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3"><path d="M12 21s-7-7.2-7-12a7 7 0 1 1 14 0c0 4.8-7 12-7 12Z"/><circle cx="12" cy="9" r="2.4"/></svg>
      <span>Directions</span>
    </a>
    <span class="detail-divider" aria-hidden="true"></span>
    <button class="detail-item" id="calendarLink" type="button">
      <svg class="detail-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3"><rect x="3.5" y="5.5" width="17" height="15" rx="1.5"/><path d="M3.5 9.5h17M8 3.5v3M16 3.5v3"/></svg>
      <span>Add to Calendar</span>
    </button>
    <span class="detail-divider" aria-hidden="true"></span>
    <a class="detail-item" id="rsvpLink" href="#">
      <svg class="detail-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3"><rect x="3" y="5" width="18" height="14" rx="1.5"/><path d="m4 6.5 8 6 8-6"/></svg>
      <span>RSVP</span>
    </a>
  </section>

  <p class="closing">Can&rsquo;t wait to celebrate together! <span class="heart-glyph heart-small">♡</span></p>

</main>

<div class="confetti-layer" id="confettiLayer" aria-hidden="true"></div>

<script src="js/script.js"></script>
</body>
</html>
